<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID CANVAS</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Space Mono', monospace;
  cursor: crosshair;
  user-select: none;
}
#stars { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; }
#canvas-layer { position: fixed; top: 0; left: 0; z-index: 1; }
#text-layer { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; }
#ui {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
  align-items: center;
}
.title-hud {
  font-family: 'Syncopate', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #D4A853;
  letter-spacing: 4px;
  text-shadow: 0 0 12px rgba(212,168,83,0.6);
  padding: 6px 14px;
  background: rgba(10,10,10,0.85);
  border: 1px solid rgba(212,168,83,0.3);
  border-radius: 2px;
}
#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: #00ff88;
  background: rgba(0,255,136,0.07);
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 2px;
  padding: 8px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.btn:hover {
  background: rgba(0,255,136,0.15);
  border-color: #00ff88;
  box-shadow: 0 0 14px rgba(0,255,136,0.3);
}
.btn.active {
  background: rgba(0,255,136,0.2);
  border-color: #00ff88;
  box-shadow: 0 0 18px rgba(0,255,136,0.4);
}
.btn-gold {
  color: #D4A853;
  background: rgba(212,168,83,0.07);
  border-color: rgba(212,168,83,0.3);
}
.btn-gold:hover {
  background: rgba(212,168,83,0.15);
  border-color: #D4A853;
  box-shadow: 0 0 14px rgba(212,168,83,0.3);
}
#mode-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  padding: 8px;
}
#zoom-indicator {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  color: rgba(212,168,83,0.5);
  letter-spacing: 1px;
  z-index: 100;
}
#coords {
  position: fixed;
  top: 16px;
  right: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: rgba(0,255,136,0.4);
  letter-spacing: 1px;
  z-index: 100;
}
.txt-node {
  position: absolute;
  pointer-events: all;
  cursor: move;
  color: #D4A853;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 8px 10px;
  background: rgba(10,10,10,0.7);
  border: 1px solid rgba(212,168,83,0.25);
  border-radius: 2px;
  white-space: pre;
  line-height: 1.5;
  min-width: 60px;
  min-height: 24px;
  text-shadow: 0 0 8px rgba(212,168,83,0.3);
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: both;
  overflow: auto;
}
.txt-node:hover, .txt-node.focused {
  border-color: rgba(212,168,83,0.7);
  box-shadow: 0 0 16px rgba(212,168,83,0.2);
}
.txt-node.dragging {
  border-color: #00ff88;
  box-shadow: 0 0 20px rgba(0,255,136,0.3);
}
#text-input-modal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200;
  background: rgba(16,16,16,0.97);
  border: 1px solid rgba(212,168,83,0.5);
  border-radius: 4px;
  padding: 24px;
  width: 340px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(212,168,83,0.15);
}
#text-input-modal h3 {
  font-family: 'Syncopate', sans-serif;
  font-size: 11px;
  color: #D4A853;
  letter-spacing: 3px;
  margin-bottom: 16px;
}
#text-input-modal textarea {
  width: 100%;
  height: 80px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(212,168,83,0.3);
  border-radius: 2px;
  color: #D4A853;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  padding: 10px;
  resize: none;
  outline: none;
}
#text-input-modal textarea::placeholder { color: rgba(212,168,83,0.3); }
#text-input-modal .modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
#text-input-modal .modal-btns .btn { flex: 1; text-align: center; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="canvas-layer"></canvas>
<div id="text-layer"></div>

<div id="ui">
  <div class="title-hud">VOID CANVAS</div>
</div>

<div id="coords">X: 0 Y: 0</div>
<div id="zoom-indicator">ZOOM: 100%</div>

<div id="controls">
  <button class="btn active" id="mode-text">TEXT</button>
  <button class="btn" id="mode-draw">DRAW</button>
  <button class="btn" id="mode-shape">SHAPE</button>
  <button class="btn" id="mode-particle">PARTICLE</button>
  <span id="mode-label">MODE: TEXT</span>
  <button class="btn btn-gold" id="btn-clear">CLEAR</button>
  <button class="btn btn-gold" id="btn-export">EXPORT</button>
</div>

<div id="text-input-modal">
  <h3>// PLACE TEXT</h3>
  <textarea id="modal-textarea" placeholder="type something..."></textarea>
  <div class="modal-btns">
    <button class="btn" id="modal-cancel">CANCEL</button>
    <button class="btn btn-gold" id="modal-confirm">PLACE</button>
  </div>
</div>

<script>
// ============================================================
// VOID CANVAS
// ============================================================

const starsEl = document.getElementById('stars');
const starsCtx = starsEl.getContext('2d');
const layerEl = document.getElementById('canvas-layer');
const layerCtx = layerEl.getContext('2d');
const textLayer = document.getElementById('text-layer');

let W, H;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  starsEl.width = W; starsEl.height = H;
  layerEl.width = W; layerEl.height = H;
}
resize();
window.addEventListener('resize', resize);

// View transform
let viewX = 0, viewY = 0, zoom = 1;
const MIN_ZOOM = 0.1, MAX_ZOOM = 8;

// Stars background
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * 4000 - 2000,
    y: Math.random() * 4000 - 2000,
    r: Math.random() * 1.5 + 0.3,
    a: Math.random() * 0.6 + 0.1,
    pulse: Math.random() * Math.PI * 2
  });
}

// Draw stars (always screen space)
function drawStars(t) {
  starsCtx.clearRect(0, 0, W, H);
  for (const s of stars) {
    const sx = (s.x - viewX) * zoom + W / 2;
    const sy = (s.y - viewY) * zoom + H / 2;
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) continue;
    const pa = s.a * (0.7 + 0.3 * Math.sin(t * 0.001 + s.pulse));
    starsCtx.beginPath();
    starsCtx.arc(sx, sy, s.r * zoom, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(255,255,255,${pa})`;
    starsCtx.fill();
  }
}

// Particles
const particles = [];
class Particle {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.vx = opts.vx || (Math.random() - 0.5) * 4;
    this.vy = opts.vy || (Math.random() - 0.5) * 4;
    this.life = opts.life || 120;
    this.maxLife = this.life;
    this.r = opts.r || Math.random() * 3 + 1;
    this.color = opts.color || (Math.random() > 0.5 ? '#00ff88' : '#D4A853');
    this.gravity = opts.gravity || 0;
    this.friction = opts.friction || 0.99;
  }
  update() {
    this.vx *= this.friction;
    this.vy *= this.friction;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }
  draw(ctx) {
    const sx = (this.x - viewX) * zoom + W / 2;
    const sy = (this.y - viewY) * zoom + H / 2;
    const alpha = this.life / this.maxLife;
    const r = this.r * zoom;
    if (r < 0.3) return;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('##', '#');
    // handle hex
    if (this.color.startsWith('#')) {
      const rr = parseInt(this.color.slice(1,3),16);
      const gg = parseInt(this.color.slice(3,5),16);
      const bb = parseInt(this.color.slice(5,7),16);
      ctx.fillStyle = `rgba(${rr},${gg},${bb},${alpha})`;
    }
    ctx.shadowBlur = 8 * zoom;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// Drawing paths
const paths = [];
let currentPath = null;
let drawColor = '#00ff88';
let drawWidth = 2;

// Shapes
const shapes = [];
let shapeType = 'circle'; // circle, rect, tri, hex
let shapeColor = '#D4A853';

function addShape(x, y) {
  const types = ['circle', 'rect', 'tri', 'hex'];
  const t = types[Math.floor(Math.random() * types.length)];
  const size = (Math.random() * 40 + 20) * zoom;
  shapes.push({ x, y, type: t, size, color: shapeColor, rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.04 });
  if (shapes.length > 60) shapes.shift();
}

function drawShape(ctx, s) {
  const sx = (s.x - viewX) * zoom + W / 2;
  const sy = (s.y - viewY) * zoom + H / 2;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(s.rotation);
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 1.5 * zoom;
  ctx.shadowBlur = 10;
  ctx.shadowColor = s.color;
  ctx.beginPath();
  if (s.type === 'circle') {
    ctx.arc(0, 0, s.size, 0, Math.PI * 2);
  } else if (s.type === 'rect') {
    ctx.rect(-s.size / 2, -s.size / 2, s.size, s.size);
  } else if (s.type === 'tri') {
    ctx.moveTo(0, -s.size);
    ctx.lineTo(s.size * 0.866, s.size * 0.5);
    ctx.lineTo(-s.size * 0.866, s.size * 0.5);
    ctx.closePath();
  } else if (s.type === 'hex') {
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
      const px = Math.cos(a) * s.size;
      const py = Math.sin(a) * s.size;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }
  ctx.stroke();
  ctx.restore();
}

// Text nodes
const textNodes = [];
let pendingTextPos = null;
let focusedNode = null;

// Mode
let mode = 'text'; // text, draw, shape, particle

// Pan state
let isPanning = false;
let panStartX = 0, panStartY = 0;
let panViewStartX = 0, panViewStartY = 0;
let didPan = false;

// Drag text node
let draggingNode = null;
let dragOffsetX = 0, dragOffsetY = 0;

// Mouse position in world coords
function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / zoom + viewX,
    y: (sy - H / 2) / zoom + viewY
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - viewX) * zoom + W / 2,
    y: (wy - viewY) * zoom + H / 2
  };
}

// Get pointer position (handles both mouse and touch)
function getEventXY(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

layerEl.addEventListener('mousedown', e => {
  if (e.target !== layerEl) return;
  const { x, y } = getEventXY(e);
  handlePointerDown(x, y);
});
layerEl.addEventListener('touchstart', e => {
  const { x, y } = getEventXY(e);
  handlePointerDown(x, y);
}, { passive: true });

function handlePointerDown(sx, sy) {
  const { x: wx, y: wy } = screenToWorld(sx, sy);

  if (mode === 'text') {
    pendingTextPos = { x: wx, y: wy };
    showTextModal();
  } else if (mode === 'draw') {
    isPanning = false;
    didPan = false;
    currentPath = { points: [{ x: wx, y: wy }], color: drawColor, width: drawWidth };
    paths.push(currentPath);
  } else if (mode === 'shape') {
    addShape(wx, wy);
    burstParticles(wx, wy, 6, shapeColor);
  } else if (mode === 'particle') {
    for (let i = 0; i < 30; i++) {
      particles.push(new Particle(wx, wy, {
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        color: Math.random() > 0.5 ? '#00ff88' : '#D4A853',
        life: 80 + Math.random() * 60
      }));
    }
  }
}

function showTextModal() {
  document.getElementById('text-input-modal').style.display = 'block';
  const ta = document.getElementById('modal-textarea');
  ta.value = '';
  ta.focus();
}

document.getElementById('modal-cancel').onclick = () => {
  document.getElementById('text-input-modal').style.display = 'none';
  pendingTextPos = null;
};

document.getElementById('modal-confirm').onclick = () => {
  const val = document.getElementById('modal-textarea').value.trim();
  if (val && pendingTextPos) {
    createTextNode(val, pendingTextPos.x, pendingTextPos.y);
  }
  document.getElementById('text-input-modal').style.display = 'none';
  pendingTextPos = null;
};

document.getElementById('modal-textarea').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('modal-confirm').click();
  }
  if (e.key === 'Escape') {
    document.getElementById('modal-cancel').click();
  }
});

function createTextNode(content, wx, wy) {
  const el = document.createElement('div');
  el.className = 'txt-node';
  el.textContent = content;
  textLayer.appendChild(el);
  const node = { el, wx, wy };
  el._nodeData = node;

  const { x: sx, y: sy } = worldToScreen(wx, wy);
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.transform = 'translate(-50%,-50%)';

  // Dragging
  el.addEventListener('mousedown', e => {
    e.stopPropagation();
    draggingNode = node;
    el.classList.add('dragging');
    const { x: sx2, y: sy2 } = worldToScreen(wx, wy);
    dragOffsetX = e.clientX - sx2;
    dragOffsetY = e.clientY - sy2;
  });

  el.addEventListener('focus', () => { el.classList.add('focused'); focusedNode = node; });
  el.addEventListener('blur', () => { el.classList.remove('focused'); focusedNode = null; saveNodeContent(el); });

  // Resize observer to update position
  const ro = new ResizeObserver(() => {});
  ro.observe(el);

  textNodes.push(node);
  return node;
}

function saveNodeContent(el) {
  // Content is auto-saved via textContent
}

document.addEventListener('mousemove', e => {
  if (draggingNode) {
    const sx = e.clientX - dragOffsetX;
    const sy = e.clientY - dragOffsetY;
    const { x: wx, y: wy } = screenToWorld(sx, sy);
    draggingNode.wx = wx;
    draggingNode.wy = wy;
    draggingNode.el.style.left = sx + 'px';
    draggingNode.el.style.top = sy + 'px';
  }
});

document.addEventListener('mouseup', () => {
  if (draggingNode) {
    draggingNode.el.classList.remove('dragging');
    draggingNode = null;
  }
});

layerEl.addEventListener('mousemove', e => {
  const { x: sx, y: sy } = getEventXY(e);
  handlePointerMove(sx, sy);
});
layerEl.addEventListener('touchmove', e => {
  const { x: sx, y: sy } = getEventXY(e);
  handlePointerMove(sx, sy);
}, { passive: true });

function handlePointerMove(sx, sy) {
  // Pan with right mouse or middle mouse or space+drag
  if (e && e.buttons === 2) {
    // right-click pan disabled
  }

  if (currentPath) {
    const { x: wx, y: wy } = screenToWorld(sx, sy);
    currentPath.points.push({ x: wx, y: wy });
  }
}

document.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.getModifierState && e.getModifierState('Shift'))) {
    // Middle click or shift+left = pan
    isPanning = true;
    didPan = false;
    panStartX = e.clientX; panStartY = e.clientY;
    panViewStartX = viewX; panViewStartY = viewY;
    e.preventDefault();
  }
  if (e.button === 0 && e.getModifierState && e.getModifierState('Space')) {
    isPanning = true;
    didPan = false;
    panStartX = e.clientX; panStartY = e.clientY;
    panViewStartX = viewX; panViewStartY = viewY;
  }
});

document.addEventListener('mousemove', e => {
  if (isPanning) {
    didPan = true;
    const dx = (e.clientX - panStartX) / zoom;
    const dy = (e.clientY - panStartY) / zoom;
    viewX = panViewStartX - dx;
    viewY = panViewStartY - dy;
  }
  // Update coords display
  const { x: wx, y: wy } = screenToWorld(e.clientX, e.clientY);
  document.getElementById('coords').textContent = `X: ${Math.round(wx)} Y: ${Math.round(wy)}`;
});

document.addEventListener('mouseup', e => {
  if (isPanning) isPanning = false;
});

// Zoom
layerEl.addEventListener('wheel', e => {
  e.preventDefault();
  const { x: sx, y: sy } = getEventXY(e);
  const { x: wx, y: wy } = screenToWorld(sx, sy);
  const zoomFactor = e.deltaY > 0 ? 0.85 : 1.15;
  zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * zoomFactor));
  viewX = wx - (sx - W / 2) / zoom;
  viewY = wy - (sy - H / 2) / zoom;
  document.getElementById('zoom-indicator').textContent = `ZOOM: ${Math.round(zoom * 100)}%`;
}, { passive: false });

// Burst particles helper
function burstParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, {
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      color,
      life: 40 + Math.random() * 30,
      friction: 0.96
    }));
  }
}

// Draw paths in world space
function drawPaths(ctx) {
  for (const path of paths) {
    if (path.points.length < 2) continue;
    ctx.beginPath();
    const first = worldToScreen(path.points[0].x, path.points[0].y);
    ctx.moveTo(first.x, first.y);
    for (let i = 1; i < path.points.length; i++) {
      const pt = worldToScreen(path.points[i].x, path.points[i].y);
      ctx.lineTo(pt.x, pt.y);
    }
    ctx.strokeStyle = path.color;
    ctx.lineWidth = path.width * zoom;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 6;
    ctx.shadowColor = path.color;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// Draw shapes in world space
function drawShapes(ctx) {
  for (const s of shapes) {
    drawShape(ctx, s);
  }
}

// Update text node positions
function updateTextNodes() {
  for (const node of textNodes) {
    const { x: sx, y: sy } = worldToScreen(node.wx, node.wy);
    if (node !== draggingNode) {
      node.el.style.left = sx + 'px';
      node.el.style.top = sy + 'px';
      node.el.style.transform = 'translate(-50%,-50%)';
    }
  }
}

// Ambient particle spawning
let ambientTimer = 0;

// Main loop
let frameCount = 0;
function loop(t) {
  requestAnimationFrame(loop);
  frameCount++;

  // Clear layers
  layerCtx.clearRect(0, 0, W, H);

  // Update shapes rotation
  for (const s of shapes) {
    s.rotation += s.rotSpeed;
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // Ambient particles
  ambientTimer++;
  if (ambientTimer > 30 && particles.length < 150) {
    ambientTimer = 0;
    const wx2 = viewX + (Math.random() - 0.5) * 600 / zoom;
    const wy2 = viewY + (Math.random() - 0.5) * 400 / zoom;
    particles.push(new Particle(wx2, wy2, {
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: Math.random() * 1.5 + 0.5,
      life: 200 + Math.random() * 100,
      color: Math.random() > 0.7 ? '#D4A853' : '#00ff88',
      friction: 0.999,
      gravity: 0
    }));
  }

  // Draw shapes
  drawShapes(layerCtx);

  // Draw paths
  drawPaths(layerCtx);

  // Draw particles
  for (const p of particles) {
    p.draw(layerCtx);
  }

  // Update text nodes
  updateTextNodes();

  // Draw stars
  drawStars(t);
}
requestAnimationFrame(loop);

// Buttons
const modeButtons = [
  { id: 'mode-text', label: 'TEXT', mode: 'text' },
  { id: 'mode-draw', label: 'DRAW', mode: 'draw' },
  { id: 'mode-shape', label: 'SHAPE', mode: 'shape' },
  { id: 'mode-particle', label: 'PARTICLE', mode: 'particle' }
];

for (const mb of modeButtons) {
  document.getElementById(mb.id).onclick = () => {
    mode = mb.mode;
    document.getElementById('mode-label').textContent = `MODE: ${mb.label}`;
    for (const b of modeButtons) {
      document.getElementById(b.id).classList.toggle('active', b.mode === mode);
    }
  };
}

document.getElementById('btn-clear').onclick = () => {
  shapes.length = 0;
  paths.length = 0;
  particles.length = 0;
  textNodes.forEach(n => n.el.remove());
  textNodes.length = 0;
};

document.getElementById('btn-export').onclick = () => {
  const data = {
    textNodes: textNodes.map(n => ({ content: n.el.textContent, x: n.wx, y: n.wy })),
    shapes: shapes.map(s => ({ ...s })),
    paths: paths.map(p => ({ ...p }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'void-canvas-export.json';
  a.click();
};

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === '1') { document.getElementById('mode-text').click(); }
  if (e.key === '2') { document.getElementById('mode-draw').click(); }
  if (e.key === '3') { document.getElementById('mode-shape').click(); }
  if (e.key === '4') { document.getElementById('mode-particle').click(); }
  if (e.key === 'c' || e.key === 'C') { if (!e.ctrlKey && !e.metaKey) document.getElementById('btn-clear').click(); }
  if (e.key === 'e' || e.key === 'E') { document.getElementById('btn-export').click(); }
  if (e.key === 'r' || e.key === 'R') {
    viewX = 0; viewY = 0; zoom = 1;
    document.getElementById('zoom-indicator').textContent = 'ZOOM: 100%';
  }
});

// Disable right-click context
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
